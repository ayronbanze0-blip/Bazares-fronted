<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Favoritos — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header><div class="overlay" id="overlay"></div><aside id="sidebar" class="closed"></aside>
<div id="main"><div class="pg-body">
  <div class="pg-hero" style="margin-bottom:24px">
    <div class="pg-hero-content">
      <div class="section-pill">❤️ Guardados</div>
      <h1>Os meus Favoritos</h1>
      <p>Produtos que guardou para mais tarde</p>
    </div>
  </div>
  <div id="fav-grid" class="p-grid"><div style="text-align:center;padding:40px;grid-column:1/-1"><span class="spinner spinner-dark"></span></div></div>
</div></div>
<div id="modal-root"></div><div id="toast-root"></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
initPage({ active:'favorites.html', requireAuth:true, roles:['BUYER'], onReady: async()=>{
  const grid=document.getElementById('fav-grid');
  try{
    const res=await api.get('/products/favorites');
    const products=res?.data?.products||[];
    grid.innerHTML=products.length?products.map(p=>productCard({...p,isFavorite:true})).join('')
      :`<div class="empty" style="grid-column:1/-1"><div class="empty-ico">❤️</div><h3>Sem favoritos ainda</h3><p>Explore produtos e clique em 🤍 para guardar</p><button class="btn btn-primary btn-sm" style="margin-top:16px" onclick="go('products.html')">Explorar →</button></div>`;
  }catch(e){grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;}
}});
</script></body></html>
