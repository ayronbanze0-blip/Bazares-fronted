<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Financeiro — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main"><div id="view" class="pg-body"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'admin-finance.html', requireAuth: true, roles: ['ADMIN'], onReady: () => loadAdminFinance() });

async function loadAdminFinance() {
  const view = document.getElementById('view');
  try {
    const res = await api.get('/finance/admin/overview');
    const d = res.data;
    view.innerHTML = `
      <div class="sh-row"><h2>Financeiro da Plataforma</h2><a href="admin-wallet.html" class="btn btn-primary btn-sm">💼 Contribuições</a></div>
      <div class="stats-row" style="margin-bottom:20px">
        <div class="stat" style="border-left:3px solid var(--b-500)"><div class="val" style="color:var(--b-600)">${fmtMT(d.adminWalletBalance)}</div><div class="lbl">Saldo da Wallet (admin)</div></div>
        <div class="stat" style="border-left:3px solid var(--gold)"><div class="val" style="color:var(--gold3)">${fmtMT(d.totalFeesGenerated)}</div><div class="lbl">Taxas geradas</div></div>
        <div class="stat" style="border-left:3px solid var(--blu)"><div class="val" style="color:var(--blu)">${fmtMT(d.totalPaid)}</div><div class="lbl">Recebidas</div></div>
        <div class="stat" style="border-left:3px solid var(--red)"><div class="val" style="color:var(--red)">${fmtMT(d.totalPending)}</div><div class="lbl">Em aberto</div></div>
      </div>
      <div class="card">
        <h4 style="margin-bottom:12px">Por Bazar</h4>
        <div class="tbl-wrap" style="border:none"><table><thead><tr><th>Bazar</th><th>Vendedor</th><th>Total vendido</th><th>Contrib. pend.</th><th>Contrib. paga</th><th>Taxa %</th><th>Acções</th></tr></thead><tbody>
          ${d.bazars.map(b => `<tr>
            <td><strong>${esc(b.name)}</strong></td>
            <td style="font-size:12px">${esc(b.sellerName)}</td>
            <td style="font-weight:600">${fmtMT(b.totalSales)}</td>
            <td style="color:${b.limitReached?'var(--red)':'var(--text)'};font-weight:${b.limitReached?'700':'400'}">${fmtMT(b.pendingFees)}</td>
            <td style="color:var(--blu)">${fmtMT(b.paidFees)}</td>
            <td><span class="badge b-gld">${b.feeRate}%</span></td>
            <td style="white-space:nowrap">
              ${b.pendingFees>0 ? `<button class="btn btn-success btn-xs" onclick="confirmBazarPayment('${b.id}','${esc(b.sellerName)}')">Confirmar pagto</button>` : ''}
              <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="setBazarFeeRate('${b.id}',${b.feeRate})">Taxa</button>
              <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="adjustBazarFee('${b.id}',${b.pendingFees})">Ajustar</button>
            </td>
          </tr>`).join('')}
        </tbody></table></div>
      </div>
      <div class="card" style="margin-top:16px">
        <h4 style="margin-bottom:12px">Histórico completo de transacções</h4>
        <div id="all-tx-wrap"><div style="text-align:center;padding:20px"><span class="spinner spinner-dark"></span></div></div>
      </div>`;
    loadAllTransactions();
  } catch (e) {
    view.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;
  }
}

async function confirmBazarPayment(id, name) {
  if (!confirm(`Confirmar pagamento de ${name}? Isto zera a contribuição pendente.`)) return;
  try {
    await api.post(`/finance/admin/${id}/confirm-payment`);
    toast('Pagamento confirmado e contador reiniciado.');
    loadAdminFinance();
  } catch (e) { toast(apiErrorMessage(e), 'err'); }
}

async function setBazarFeeRate(id, current) {
  const rate = prompt('Nova taxa (%):', current);
  if (rate === null) return;
  const num = parseFloat(rate);
  if (isNaN(num) || num < 0 || num > 100) { toast('Taxa inválida.', 'warn'); return; }
  try {
    await api.patch(`/admin/bazars/${id}/fee-rate`, { feeRate: num });
    toast(`Taxa definida para ${num}%.`);
    loadAdminFinance();
  } catch (e) { toast(apiErrorMessage(e), 'err'); }
}

async function adjustBazarFee(id, currentPending) {
  const newValue = prompt('Novo valor de contribuição pendente (MT):', currentPending);
  if (newValue === null) return;
  const num = parseFloat(newValue);
  if (isNaN(num) || num < 0) { toast('Valor inválido.', 'warn'); return; }
  const reason = prompt('Motivo do ajuste (opcional):', '') || undefined;
  try {
    await api.patch(`/finance/admin/${id}/adjust-fee`, { newPendingFee: num, reason });
    toast('Contribuição ajustada.');
    loadAdminFinance();
  } catch (e) { toast(apiErrorMessage(e), 'err'); }
}

async function loadAllTransactions() {
  const wrap = document.getElementById('all-tx-wrap');
  try {
    const res = await api.get('/finance/admin/transactions', { limit: 50 });
    const txs = res?.data?.transactions || [];
    wrap.innerHTML = txs.length ? `<div class="tbl-wrap" style="border:none"><table><thead><tr><th>Data</th><th>Bazar</th><th>Tipo</th><th>Valor</th><th>Taxa</th></tr></thead><tbody>
      ${txs.map(t => `<tr>
        <td style="font-size:11px;color:var(--t4)">${fmtDate(t.createdAt)}</td>
        <td>${esc(t.bazar?.name||'—')}</td>
        <td><span class="badge ${t.type==='VENDA'?'b-grn':'b-blu'}">${t.type}</span></td>
        <td style="font-weight:600">${fmtMT(t.amount)}</td>
        <td style="color:var(--red)">${t.fee>0?'−'+fmtMT(t.fee):'—'}</td>
      </tr>`).join('')}
    </tbody></table></div>` : `<div class="empty" style="padding:20px"><p>Sem transacções.</p></div>`;
  } catch (e) {
    wrap.innerHTML = `<p style="color:var(--red);font-size:13px">${esc(apiErrorMessage(e))}</p>`;
  }
}
</script>
</body></html>
