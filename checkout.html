<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finalizar encomenda — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main"><div id="view" class="pg-body"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let _co_product = null;

initPage({ active: '', requireAuth: true, onReady: async (user) => {
  const id = getParam('id');
  const qty = Math.max(1, parseInt(getParam('qty')) || 1);
  const view = document.getElementById('view');
  if (!id) { go('products.html'); return; }

  try { _co_product = (await api.get(`/products/${id}`))?.data?.product; }
  catch { view.innerHTML = `<div class="empty"><div class="empty-ico">📦</div><h3>Produto não encontrado</h3></div>`; return; }

  const p = _co_product;
  view.innerHTML = `<div style="max-width:580px;margin:0 auto">
    <div class="sh"><h2>Finalizar encomenda</h2></div>
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t4);margin-bottom:12px">Resumo</div>
      <div style="display:flex;gap:12px;align-items:center">
        ${p.images?.[0]?.url ? `<img src="${esc(p.images[0].url)}" style="width:60px;height:60px;border-radius:var(--r);object-fit:cover">` : ''}
        <div style="flex:1"><div style="font-weight:600">${esc(p.name)}</div><div style="font-size:12px;color:var(--t4)">${esc(p.bazar?.name||'')}</div></div>
        <div id="co-total" style="font-size:17px;font-weight:800;color:var(--n-900)">${fmtMT(p.price * qty)}</div>
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
        <label style="text-transform:none;font-weight:400">Quantidade:</label>
        <input type="number" id="co-qty" value="${qty}" min="1" max="${p.stock}">
      </div>
    </div>
    <form class="card" id="co-form">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t4);margin-bottom:16px">Dados de entrega</div>
      <div class="fg"><label>Nome completo</label><input id="co-nm" value="${esc(user.name)}" required></div>
      <div class="row2">
        <div class="fg"><label>Contacto / Telefone</label><input id="co-ph" placeholder="+258 8X XXX XXXX" value="${esc(user.phone||'')}" required></div>
        <div class="fg"><label>Localização / Cidade</label><input id="co-loc" placeholder="Maputo, Beira..."></div>
      </div>
      <div class="fg"><label>Morada detalhada</label><textarea id="co-addr" rows="2" placeholder="Bairro, rua, número..." required></textarea></div>
      ${p.size ? `<div class="fg"><label>Tamanho</label><input id="co-size" placeholder="S, M, L, XL..."></div>` : ''}
      ${p.color ? `<div class="fg"><label>Cor</label><input id="co-color"></div>` : ''}
      <div class="fg"><label>Método de pagamento</label>
        <select id="co-pay"><option>Pagamento na entrega</option><option>M-Pesa</option><option>e-Mola</option><option>Mkesh</option><option>Transferência Bancária</option></select>
      </div>
      <div class="fg"><label>Observações adicionais</label><textarea id="co-notes" rows="2"></textarea></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" style="flex:1;justify-content:center" type="submit" id="co-submit">✓ Confirmar encomenda</button>
        <button class="btn btn-ghost" type="button" onclick="history.back()">Cancelar</button>
      </div>
    </form>
  </div>`;

  document.getElementById('co-qty').addEventListener('input', (e) => {
    const q = Math.max(1, Math.min(p.stock, parseInt(e.target.value) || 1));
    document.getElementById('co-total').textContent = fmtMT(p.price * q);
  });

  document.getElementById('co-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const buyerPhone = document.getElementById('co-ph').value.trim();
    const address = document.getElementById('co-addr').value.trim();
    if (!buyerPhone || !address) { toast('Preencha contacto e morada.', 'warn'); return; }
    const loc = document.getElementById('co-loc').value.trim();
    const fullAddress = loc ? `${address}, ${loc}` : address;
    const finalQty = Math.max(1, Math.min(p.stock, parseInt(document.getElementById('co-qty').value) || 1));

    const btn = document.getElementById('co-submit');
    setLoading(btn, true);
    try {
      await api.post('/orders', {
        items: [{ productId: p.id, qty: finalQty }],
        buyerName: document.getElementById('co-nm').value.trim(),
        buyerPhone,
        address: fullAddress,
        payment: document.getElementById('co-pay').value,
        size: document.getElementById('co-size')?.value || undefined,
        color: document.getElementById('co-color')?.value || undefined,
        notes: document.getElementById('co-notes').value.trim() || undefined
      });
      toast('Encomenda realizada! ✓');
      setTimeout(() => go('my-orders.html'), 700);
    } catch (err) {
      setLoading(btn, false);
      toast(apiErrorMessage(err), 'err');
    }
  });
}});
</script>
</body></html>
