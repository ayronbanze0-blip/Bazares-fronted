<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Entrar — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
/* ── Login v3 — centered card, scenic footer ─────────────────── */
*,*::before,*::after{box-sizing:border-box}

.auth-page{
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  background:#FDFBF5;
  position:relative;overflow-x:hidden;
}

/* ── Top bar: language switcher ──────────────────────────────── */
.auth-topbar{
  display:flex;justify-content:flex-end;align-items:center;
  padding:18px 22px 0;position:relative;z-index:3;
}
.auth-lang{
  display:flex;align-items:center;gap:6px;
  background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:13.5px;font-weight:600;color:var(--g-600,#3C4658);
  padding:6px 4px;
}
.auth-lang svg{transition:transform .18s ease}
.auth-lang[aria-expanded="true"] svg{transform:rotate(180deg)}

/* ── Main content ─────────────────────────────────────────────── */
.auth-main{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 26px 0;position:relative;z-index:2;
}
.auth-card-v3{width:100%;max-width:400px;margin:0 auto;padding-bottom:28px}

.auth-logo{display:flex;flex-direction:column;align-items:center;margin:14px 0 26px}
.auth-logo-mark{
  width:76px;height:76px;border-radius:22px;
  background:linear-gradient(160deg,var(--b-500,#15803D) 0%,var(--b-700,#0B4D24) 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 10px 26px rgba(21,128,61,.28);position:relative;margin-bottom:14px;
}
.auth-logo-mark svg{display:block}
.auth-logo-name{font-size:22px;font-weight:800;letter-spacing:-.01em;color:var(--n-900,#0F172A)}
.auth-logo-name span{color:var(--b-500,#15803D)}
.auth-logo-tag{font-size:12.5px;color:var(--g-500,#586478);font-weight:500;margin-top:2px}

.auth-welcome{text-align:center;margin-bottom:26px}
.auth-welcome h1{font-size:21px;font-weight:800;color:var(--n-900,#0F172A);letter-spacing:-.01em;margin-bottom:6px}
.auth-welcome p{font-size:13.5px;color:var(--g-500,#586478)}

/* Input fields */
.af-field{margin-bottom:14px}
.af-inp{position:relative;display:flex;align-items:center}
.af-inp svg{position:absolute;left:16px;color:var(--g-400,#7C8AA0);pointer-events:none;flex-shrink:0}
.af-inp input{
  width:100%;padding:15px 16px 15px 46px;
  border:1.5px solid var(--g-200,#DCE3EA);border-radius:16px;
  font-family:inherit;font-size:16px;color:var(--n-900,#0F172A);
  background:#fff;transition:border-color .18s ease,box-shadow .18s ease;
  outline:none;
}
/* O campo de senha tem o botão-olho flutuando por cima; sem isto, texto
   digitado longo passa por baixo do ícone em vez de parar antes dele. */
#lpw{padding-right:44px}
.af-inp input::placeholder{color:var(--g-400,#7C8AA0)}
.af-inp input:focus{border-color:var(--b-500,#15803D);box-shadow:0 0 0 3px rgba(21,128,61,.1)}
.af-inp .af-pw-toggle{
  position:absolute;right:14px;background:none;border:none;
  color:var(--g-400,#7C8AA0);cursor:pointer;padding:5px;
  display:flex;align-items:center;border-radius:6px;transition:color .15s ease;
}
.af-inp .af-pw-toggle:hover{color:var(--b-500,#15803D)}

.af-row{display:flex;justify-content:center;margin:2px 0 20px}
.af-forgot{font-size:13px;font-weight:600;color:var(--b-600,#0F6630);text-decoration:none}
.af-forgot:hover{text-decoration:underline}

.af-submit{
  width:100%;padding:16px;border-radius:16px;font-size:15.5px;font-weight:700;
  background:linear-gradient(135deg,var(--b-500,#15803D),var(--b-700,#0B4D24));
  color:#fff;border:none;cursor:pointer;
  box-shadow:0 8px 22px rgba(21,128,61,.32);
  transition:transform .18s ease,box-shadow .18s ease;
}
.af-submit:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(21,128,61,.4)}
.af-submit:active{transform:scale(.98)}
.af-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

.af-divider{
  display:flex;align-items:center;gap:10px;
  margin:22px 0;color:var(--g-400,#7C8AA0);font-size:12.5px;font-weight:500;
}
.af-divider::before,.af-divider::after{content:'';flex:1;height:1px;background:var(--g-200,#DCE3EA)}

.af-social{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.af-social button{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 6px;border:1.5px solid var(--g-200,#DCE3EA);border-radius:14px;
  background:#fff;font-size:12.5px;font-weight:600;color:var(--n-700,#1E2D4A);
  cursor:pointer;transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease;
}
.af-social button:hover{border-color:var(--b-300,#5FC588);box-shadow:0 2px 10px rgba(21,128,61,.12);transform:translateY(-1px)}

.af-foot{text-align:center;font-size:13.5px;color:var(--g-500,#586478)}
.af-foot a{color:var(--b-600,#0F6630);font-weight:700;text-decoration:none}
.af-foot a:hover{text-decoration:underline}

.af-alert{
  border-radius:12px;padding:11px 14px;margin-bottom:16px;
  font-size:13px;font-weight:500;display:flex;align-items:flex-start;gap:8px;
  animation:slideUp .25s ease both;
}
.af-alert-err{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c}
.af-alert-ok {background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d}

/* ── Scenic footer illustration ──────────────────────────────── */
.auth-scene{
  position:relative;width:100%;height:190px;margin-top:auto;
  overflow:hidden;flex-shrink:0;
}
.auth-scene-sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#FDFBF5 0%,#F3E7D6 30%,#E8CBAE 55%,#D9A98A 75%,#C98E75 100%);
}
.auth-scene-sun{
  position:absolute;left:50%;top:18%;width:70px;height:70px;border-radius:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle,#FDE08A 0%,#FBBF24 60%,rgba(251,191,36,0) 72%);
  opacity:.8;
}
.auth-scene-water{
  position:absolute;left:0;right:0;bottom:34px;height:70px;
  background:linear-gradient(180deg,#8FAFC4 0%,#5E85A0 55%,#3F6480 100%);
}
.auth-scene-water::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.12) 0 3px,transparent 3px 22px);
  opacity:.5;
}
.auth-scene-hills{
  position:absolute;left:0;right:0;bottom:78px;height:60px;
  background:
    radial-gradient(ellipse 180px 60px at 12% 100%,#4A6E5A 0%,transparent 70%),
    radial-gradient(ellipse 220px 70px at 55% 100%,#3D5C4A 0%,transparent 70%),
    radial-gradient(ellipse 200px 65px at 92% 100%,#2F4A3A 0%,transparent 70%);
  opacity:.55;
}
.auth-scene-bridge{position:absolute;left:0;right:0;bottom:34px;height:56px}
.auth-scene-city{
  position:absolute;left:0;right:0;bottom:34px;height:38px;
  background:
    linear-gradient(0deg,#2B3B4E 0 100%) 4% 0/3% 60% no-repeat,
    linear-gradient(0deg,#2B3B4E 0 100%) 9% 0/2% 90% no-repeat,
    linear-gradient(0deg,#2B3B4E 0 100%) 14% 0/4% 45% no-repeat,
    linear-gradient(0deg,#31435A 0 100%) 78% 0/3% 70% no-repeat,
    linear-gradient(0deg,#31435A 0 100%) 84% 0/2.5% 100% no-repeat,
    linear-gradient(0deg,#31435A 0 100%) 90% 0/3.5% 50% no-repeat;
  opacity:.85;
}
.auth-scene-capulana{
  position:absolute;left:0;right:0;bottom:0;height:34px;
  background:repeating-linear-gradient(115deg,
    #15803D 0 10%, #0B4D24 10% 20%, #FBBF24 20% 30%,
    #1E2D4A 30% 40%, #15803D 40% 50%, #FBBF24 50% 60%,
    #0B4D24 60% 70%, #1E2D4A 70% 80%, #FBBF24 80% 90%, #15803D 90% 100%);
}
.auth-scene-capulana::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(115deg,rgba(0,0,0,0) 0 8px,rgba(0,0,0,.08) 8px 9px);
}

@media(max-width:380px){
  .auth-logo-mark{width:64px;height:64px;border-radius:18px}
  .auth-scene{height:150px}
}
</style>
</head>
<body style="margin:0;padding:0">

<div class="auth-page">

  <div class="auth-topbar">
    <button type="button" class="auth-lang" id="lang-btn" aria-expanded="false">
      Português
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>

  <div class="auth-main">
    <div class="auth-card-v3">

      <div class="auth-logo">
        <div class="auth-logo-mark">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
            <path d="M8 8V6.5a4 4 0 0 1 8 0V8" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
            <path d="M5.2 8h13.6l1 12.2a2 2 0 0 1-2 2.1H6.2a2 2 0 0 1-2-2.1L5.2 8z" fill="#fff" fill-opacity=".95"/>
          </svg>
        </div>
        <div class="auth-logo-name">BAZ<span>ARES</span></div>
        <div class="auth-logo-tag">Marketplace Moçambicano</div>
      </div>

      <div class="auth-welcome">
        <h1>Bem-vindo de volta! 👋</h1>
        <p>Faça login para continuar a sua jornada</p>
      </div>

      <div id="login-alert"></div>

      <div class="af-field">
        <div class="af-inp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" id="lem" placeholder="Email" autocomplete="username" required>
        </div>
      </div>

      <div class="af-field">
        <div class="af-inp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="lpw" placeholder="Senha" autocomplete="current-password" required>
          <button type="button" class="af-pw-toggle" id="toggle-pw" aria-label="Mostrar senha">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="af-row">
        <a href="forgot-password.html" class="af-forgot">Esqueceu a senha?</a>
      </div>

      <button class="af-submit" id="login-btn" type="button">Entrar</button>

      <div class="af-divider">ou continue com</div>

      <div class="af-social">
        <button type="button">
          <svg width="15" height="15" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
        <button type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 2c1.89 0 3.627.63 5.03 1.68L4.68 17.03A7.965 7.965 0 0 1 4 12c0-4.418 3.582-8 8-8zm0 16c-1.89 0-3.627-.63-5.03-1.68l12.35-12.35A7.965 7.965 0 0 1 20 12c0 4.418-3.582 8-8 8z"/></svg>
          Apple
        </button>
      </div>

      <p class="af-foot">Ainda não tem uma conta? <a href="register.html">Criar conta</a></p>

    </div>
  </div>

  <div class="auth-scene" aria-hidden="true">
    <div class="auth-scene-sky"></div>
    <div class="auth-scene-sun"></div>
    <div class="auth-scene-hills"></div>
    <div class="auth-scene-water"></div>
    <div class="auth-scene-city"></div>
    <svg class="auth-scene-bridge" viewBox="0 0 400 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="40" x2="400" y2="40" stroke="#2B3B4E" stroke-width="2.5"/>
      <line x1="90" y1="4" x2="90" y2="40" stroke="#2B3B4E" stroke-width="3"/>
      <line x1="310" y1="4" x2="310" y2="40" stroke="#2B3B4E" stroke-width="3"/>
      <line x1="90" y1="4" x2="20" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="90" y1="4" x2="55" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="90" y1="4" x2="130" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="90" y1="4" x2="165" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="90" y1="4" x2="200" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="310" y1="4" x2="380" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="310" y1="4" x2="345" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="310" y1="4" x2="270" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="310" y1="4" x2="235" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
      <line x1="310" y1="4" x2="200" y2="40" stroke="#2B3B4E" stroke-width="1.4"/>
    </svg>
    <div class="auth-scene-capulana"></div>
  </div>

</div>

<div id="modal-root"></div><div id="toast-root"></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
initPage({ active:'login.html', onReady: (user) => {
  if (user) { go('dashboard.html'); return; }

  // Pre-fill email from register flow
  const preEmail = getParam('email');
  if (preEmail) document.getElementById('lem').value = preEmail;

  // Password toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw  = document.getElementById('lpw');
    const ico = document.getElementById('eye-icon');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    ico.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
  });

  // Language selector (decorativo — só PT disponível por agora)
  document.getElementById('lang-btn').addEventListener('click', function() {
    toast('Por agora só está disponível em Português.', 'info');
  });

  // Login handler
  const doLogin = async () => {
    const email    = document.getElementById('lem').value.trim();
    const password = document.getElementById('lpw').value;
    const alertBox = document.getElementById('login-alert');
    alertBox.innerHTML = '';

    if (!email || !password) {
      alertBox.innerHTML = '<div class="af-alert af-alert-err">⚠ Preencha o email e a senha.</div>';
      return;
    }

    const btn = document.getElementById('login-btn');
    setLoading(btn, true);
    try {
      await Session.login(email, password);
      alertBox.innerHTML = '<div class="af-alert af-alert-ok">✓ Bem-vindo de volta! A redirecionar…</div>';
      const next = getParam('next');
      setTimeout(() => window.location.href = next || 'dashboard.html', 700);
    } catch (err) {
      setLoading(btn, false);
      const msg = err.code === 'EMAIL_NOT_VERIFIED'
        ? 'Credenciais inválidas ou conta não activa.'
        : apiErrorMessage(err);
      alertBox.innerHTML = `<div class="af-alert af-alert-err">⚠ ${msg}</div>`;
      document.getElementById('lem').focus();
    }
  };

  document.getElementById('login-btn').addEventListener('click', doLogin);

  // Allow Enter key in both fields
  ['lem','lpw'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
}});
</script>
</body>
</html>
