<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carrinho — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header><div class="overlay" id="overlay"></div><aside id="sidebar" class="closed"></aside>
<div id="main"><div id="view" class="pg-body"></div></div>
<div id="modal-root"></div><div id="toast-root"></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
let _cartItems=[];
initPage({ active:'cart.html', requireAuth:true, roles:['BUYER'], onReady: async()=>{
  document.getElementById('view').innerHTML=`
    <div class="pg-hero">
      <div class="pg-hero-content">
        <div class="section-pill">🛒 Carrinho</div>
        <h1>O meu carrinho</h1>
      </div>
    </div>
    <div id="cart-body"></div>`;
  await loadCart();
}});

async function loadCart(){
  const body=document.getElementById('cart-body');
  body.innerHTML=`<div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div>`;
  try{
    const res=await api.get('/cart');
    _cartItems=res?.data?.items||[];
    if(!_cartItems.length){
      body.innerHTML=`<div class="empty"><div class="empty-ico">🛒</div><h3>Carrinho vazio</h3><p>Explore os nossos produtos e adicione ao carrinho</p><button class="btn btn-primary btn-sm" style="margin-top:16px" onclick="go('products.html')">🛍 Explorar produtos</button></div>`;
      return;
    }
    const total=_cartItems.reduce((s,i)=>s+(i.price||i.product?.price||0)*i.qty,0);
    body.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start" id="cart-grid">
        <div style="display:flex;flex-direction:column;gap:10px" id="cart-items">
          ${_cartItems.map(i=>cartItemHtml(i)).join('')}
        </div>
        <div class="cart-summary" style="position:sticky;top:80px">
          <h3 style="margin-bottom:18px">Resumo</h3>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
            ${_cartItems.map(i=>`<div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--t2)">${esc(i.name||i.product?.name||'')} ×${i.qty}</span><span style="font-weight:600">${fmtMT((i.price||i.product?.price||0)*i.qty)}</span></div>`).join('')}
          </div>
          <div class="divider"></div>
          <div style="display:flex;justify-content:space-between;margin:14px 0">
            <span style="font-weight:700">Total</span>
            <span style="font-family:'Inter',sans-serif;font-weight:800;font-size:20px;font-weight:900;color:var(--b-600)">${fmtMT(total)}</span>
          </div>
          <button class="btn btn-gold btn-block" style="font-size:14px;padding:13px" onclick="go('checkout.html')">⚡ Finalizar compra</button>
          <button class="btn btn-ghost btn-block btn-sm" style="margin-top:8px" onclick="go('products.html')">Continuar a comprar</button>
        </div>
      </div>`;
    // responsive
    if(window.innerWidth<700) document.getElementById('cart-grid').style.gridTemplateColumns='1fr';
  }catch(e){body.innerHTML=`<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;}
}

function cartItemHtml(i){
  const img=i.image||i.product?.images?.[0]?.url||'';
  return `<div class="cart-item" id="ci-${i.id}">
    <div class="cart-img">${img?`<img src="${esc(img)}" alt="" style="width:100%;height:100%;object-fit:cover">`:`<div style="width:100%;height:100%;background:var(--g-100);display:flex;align-items:center;justify-content:center;font-size:24px">📦</div>`}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:14px;margin-bottom:2px">${esc(i.name||i.product?.name||'')}</div>
      <div style="font-size:12px;color:var(--t4)">${fmtMT(i.price||i.product?.price||0)} / un.</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-icon" style="width:28px;height:28px;border-radius:8px;font-size:14px" onclick="updateQty('${i.id}',${i.qty-1})">−</button>
      <span style="font-weight:700;min-width:20px;text-align:center">${i.qty}</span>
      <button class="btn-icon" style="width:28px;height:28px;border-radius:8px;font-size:14px" onclick="updateQty('${i.id}',${i.qty+1})">+</button>
    </div>
    <div style="font-family:'Inter',sans-serif;font-weight:800;font-weight:800;font-size:16px;color:var(--b-600);min-width:80px;text-align:right">${fmtMT((i.price||i.product?.price||0)*i.qty)}</div>
    <button class="btn-icon" style="color:var(--red)" onclick="removeItem('${i.id}')">🗑</button>
  </div>`;
}

async function updateQty(itemId,qty){
  if(qty<=0){await removeItem(itemId);return;}
  try{await api.patch(`/cart/items/${itemId}`,{qty});await loadCart();}
  catch(e){toast(apiErrorMessage(e),'err');}
}
async function removeItem(itemId){
  try{await api.delete(`/cart/items/${itemId}`);await refreshCartCount();await loadCart();}
  catch(e){toast(apiErrorMessage(e),'err');}
}
</script></body></html>
