<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verificar email — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div class="auth-wrap">
      <div class="card" style="text-align:center;padding:36px">
        <div style="font-size:52px;margin-bottom:14px">📧</div>
        <h2>Verificar email</h2>
        <p style="font-size:13px;margin:10px 0 22px">Enviámos um código de 6 dígitos para <strong id="ve-email"></strong></p>
        <form id="ve-form">
          <div class="fg">
            <label>Código de verificação</label>
            <input id="vcode" placeholder="000000" maxlength="6" inputmode="numeric"
              style="text-align:center;font-size:22px;letter-spacing:8px;font-weight:700">
          </div>
          <button class="btn btn-primary btn-block" type="submit" id="ve-btn">Verificar e continuar</button>
        </form>
        <div style="margin-top:12px;font-size:12px;color:var(--t4)">Não recebeu? <a href="#" id="resend-link">Reenviar</a></div>
      </div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: '', onReady: (user) => {
  if (user) { go('dashboard.html'); return; }

  const email = getParam('email');
  if (!email) { go('register.html'); return; }
  document.getElementById('ve-email').textContent = email;

  document.getElementById('vcode').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
  });

  document.getElementById('ve-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = document.getElementById('vcode').value.trim();
    if (code.length !== 6) { toast('Introduza o código de 6 dígitos.', 'warn'); return; }

    const btn = document.getElementById('ve-btn');
    setLoading(btn, true);
    try {
      const res = await api.post('/auth/verify-email', { email, code });
      if (res?.data?.accessToken) setAccessToken(res.data.accessToken);
      const me = await api.get('/auth/me');
      Session._user = me?.data?.user || null;
      toast('Email verificado! ✓');
      setTimeout(() => go('dashboard.html'), 600);
    } catch (err) {
      setLoading(btn, false);
      toast(apiErrorMessage(err), 'err');
    }
  });

  document.getElementById('resend-link').addEventListener('click', async (e) => {
    e.preventDefault();
    try {
      await api.post('/auth/resend-verification', { email });
      toast('Novo código enviado.', 'info');
    } catch (err) { toast(apiErrorMessage(err), 'err'); }
  });
}});
</script>
</body></html>
