<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contribuições — Admin Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header><div class="overlay" id="overlay"></div><aside id="sidebar" class="closed"></aside>
<div id="main"><div id="view" class="pg-body"></div></div>
<div id="modal-root"></div><div id="toast-root"></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
initPage({ active:'admin-wallet.html', requireAuth:true, roles:['ADMIN'], onReady: async () => {
  await renderShell();
}});

async function renderShell() {
  let gatewayStatus = null;
  try { gatewayStatus = (await api.get('/wallet/admin/gateway/validate'))?.data; } catch {}

  document.getElementById('view').innerHTML = `
    <div class="pg-hero"><div class="pg-hero-content">
      <div class="section-pill">💼 Wallet</div>
      <h1>Contribuições de Plataforma</h1>
      <p>Pagamentos de comissão dos vendedores via STK push</p>
    </div></div>

    ${gatewayStatus ? (gatewayStatus.configured
      ? `<div class="alert a-info" style="margin-bottom:16px">✅ ZumboPay configurada e ${gatewayStatus.ready ? 'pronta para uso.' : 'com configuração incompleta — verifique as carteiras no painel.'}</div>`
      : `<div class="alert a-warn" style="margin-bottom:16px">⚠️ ZumboPay ainda não está configurada (variáveis de ambiente em falta). O pagamento de comissão via STK não vai funcionar até isso ser feito.</div>`
    ) : ''}

    <div id="aw-content"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div>`;

  await loadComissoes();
}

async function loadComissoes() {
  const content = document.getElementById('aw-content');
  content.innerHTML = `<div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div>`;
  try {
    const res = await api.get('/wallet/admin/commission-payments', { limit: 50 });
    const payments = res.data.payments || [];
    content.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Data</th><th>Vendedor</th><th>Valor</th><th>Método</th><th>Estado</th></tr></thead>
      <tbody>${payments.length ? payments.map(p => `<tr>
        <td style="color:var(--t3);font-size:12px">${fmtDate(p.createdAt)}</td>
        <td>${esc(p.seller.name)}</td>
        <td style="font-weight:700">${fmtMT(p.amount)}</td>
        <td>${p.method === 'WALLET' ? '💼 Wallet' : p.method === 'ZUMBOPAY' ? '📲 ZumboPay' : '🧾 Manual'}</td>
        <td>${commissionStatusBadge(p.status)}</td>
      </tr>`).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--t4);padding:32px">Sem contribuições registadas</td></tr>`}</tbody>
    </table></div>`;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;
  }
}

function commissionStatusBadge(s) {
  const map = { PENDENTE: ['Pendente', 'b-gld'], PROCESSANDO: ['A processar', 'b-blu'], PAGA: ['Paga', 'b-grn'], FALHADA: ['Falhou', 'b-red'] };
  const [label, cls] = map[s] || [s, 'b-blu'];
  return `<span class="badge ${cls}">${label}</span>`;
}
</script>
</body></html>
