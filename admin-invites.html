<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Convites — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div class="sh"><h2>Convites para Revendedores</h2><p>Cada convite é de utilização única.</p></div>
    <div class="card" style="margin-bottom:18px;max-width:460px">
      <h4 style="margin-bottom:12px">Gerar novo convite</h4>
      <div class="fg"><label>Observação (opcional)</label><input id="inv-note" placeholder="Para quem é este convite?"></div>
      <button class="btn btn-primary" onclick="generateInvite()">Gerar convite</button>
    </div>
    <div id="inv-list"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'admin-invites.html', requireAuth: true, roles: ['ADMIN'], onReady: () => loadInvites() });

async function loadInvites() {
  const list = document.getElementById('inv-list');
  try {
    const res = await api.get('/revendedor/invites');
    const invites = res?.data?.invites || [];
    if (!invites.length) { list.innerHTML = `<div class="empty"><div class="empty-ico">✉️</div><h3>Nenhum convite gerado</h3></div>`; return; }
    list.innerHTML = `<div class="card"><h4 style="margin-bottom:12px">Convites emitidos (${invites.length})</h4>
      <div class="tbl-wrap" style="border:none"><table><thead><tr><th>Token</th><th>Observação</th><th>Criado</th><th>Estado</th><th>Usado por</th><th>Acção</th></tr></thead><tbody>
        ${invites.map(i => `<tr>
          <td><code style="font-size:11px;background:var(--surf3);padding:2px 6px;border-radius:4px">${esc(i.token)}</code></td>
          <td style="font-size:12px;color:var(--t3)">${esc(i.note||'—')}</td>
          <td style="font-size:11px;color:var(--t4)">${fmtDate(i.createdAt)}</td>
          <td><span class="badge ${i.used?'b-gray':'b-grn'}">${i.used?'Usado':'Disponível'}</span></td>
          <td style="font-size:12px">${esc(i.usedByUsers?.[0]?.name || '—')}</td>
          <td>${!i.used ? `<button class="btn btn-ghost btn-xs" onclick="revokeInvite('${i.id}')">Revogar</button>` : '—'}</td>
        </tr>`).join('')}
      </tbody></table></div>
    </div>`;
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;
  }
}

async function generateInvite() {
  const note = document.getElementById('inv-note').value.trim();
  try {
    const res = await api.post('/revendedor/invites', { note: note || undefined });
    const { invite, links } = res.data;
    document.getElementById('inv-note').value = '';
    toast('Convite gerado!');
    openModal(`
      <div class="modal-hd" style="justify-content:center;position:relative"><h2>Convite gerado</h2><button class="modal-x" style="position:absolute;right:0" onclick="closeModal()">✕</button></div>
      <p style="font-size:13px;color:var(--t3);margin-bottom:14px;text-align:center">Token único de utilização única</p>
      <div class="code-box">${esc(invite.token)}</div>
      <p style="font-size:12px;color:var(--t4);margin:10px 0 6px">Links aceites:</p>
      <div style="display:flex;flex-direction:column;gap:5px;font-size:11px;color:var(--t3)">
        ${Object.values(links).map(l => `<code>${esc(l)}</code>`).join('')}
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:14px" onclick="copyLink('${esc(links.register)}');closeModal()">📋 Copiar link e fechar</button>
    `);
    loadInvites();
  } catch (e) { toast(apiErrorMessage(e), 'err'); }
}

async function revokeInvite(id) {
  if (!confirm('Revogar este convite?')) return;
  try { await api.delete(`/revendedor/invites/${id}`); toast('Convite revogado.'); loadInvites(); }
  catch (e) { toast(apiErrorMessage(e), 'err'); }
}

function copyLink(text) {
  navigator.clipboard?.writeText(text).then(() => toast('Link copiado!')).catch(() => toast('Link: ' + text, 'info', 7000));
}
</script>
</body></html>
