<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Visão Geral — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main"><div id="view" class="pg-body"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div></div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'admin.html', requireAuth: true, roles: ['ADMIN'], onReady: async () => {
  const view = document.getElementById('view');
  try {
    const res = await api.get('/admin/overview');
    const d = res.data;
    const totalOrders = d.ordersByStatus.reduce((s,o)=>s+o._count,0) || 1;

    view.innerHTML = `
      <div class="sh"><h2>Visão Geral da Plataforma</h2></div>
      <div class="stats-row">
        ${[['Vendedores',d.sellers],['Compradores',d.buyers],['Revendedores',`${d.revendedores}/${d.revendedoresMax}`],['Bazares',d.bazars],['Produtos',d.products],['Encomendas',d.orders]].map(([l,v])=>`<div class="stat acc"><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join('')}
      </div>
      <div class="stats-row">
        <div class="stat" style="border-left:3px solid var(--grn)"><div class="val" style="color:var(--grn)">${fmtMT(d.totalSalesVolume)}</div><div class="lbl">Volume de vendas</div></div>
        <div class="stat" style="border-left:3px solid #D97706"><div class="val" style="color:var(--amb)">${fmtMT(d.totalFeesGenerated)}</div><div class="lbl">Taxas geradas</div></div>
        <div class="stat" style="border-left:3px solid var(--red)"><div class="val" style="color:var(--red)">${d.pendingReports}</div><div class="lbl">Denúncias pendentes</div></div>
      </div>
      <div class="row2">
        <div class="card">
          <h4 style="margin-bottom:12px">Estado das encomendas</h4>
          ${d.ordersByStatus.map(({status,_count}) => `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="min-width:110px;font-size:12px;color:var(--t3)">${STATUS_LABEL[status]||status}</span>
            <div class="prog" style="flex:1"><div class="prog-fill pf-navy" style="width:${Math.round((_count/totalOrders)*100)}%"></div></div>
            <span style="font-size:12px;font-weight:700;min-width:28px;text-align:right">${_count}</span>
          </div>`).join('')}
        </div>
        <div class="card">
          <h4 style="margin-bottom:12px">Acções rápidas</h4>
          <div style="display:flex;flex-direction:column;gap:7px">
            <button class="btn btn-primary btn-sm btn-block" onclick="go('admin-invites.html')">✉ Convidar Revendedor</button>
            <button class="btn btn-ghost btn-sm btn-block" onclick="go('admin-users.html')">Gerir Utilizadores</button>
            <button class="btn btn-ghost btn-sm btn-block" onclick="go('admin-orders.html')">Todas as encomendas</button>
            <button class="btn btn-ghost btn-sm btn-block" onclick="go('admin-denuncias.html')">🚩 Denúncias</button>
            <button class="btn btn-ghost btn-sm btn-block" onclick="go('admin-broadcast.html')">📢 Enviar aviso</button>
          </div>
        </div>
      </div>`;
  } catch (e) {
    view.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;
  }
}});
</script>
</body></html>
