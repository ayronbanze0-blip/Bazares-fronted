<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recuperar acesso — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div class="auth-wrap">
      <form class="card" id="req-form">
        <h2 style="margin-bottom:8px">Recuperar acesso</h2>
        <p style="font-size:13px;margin-bottom:20px">Introduza o seu email para receber um código de redefinição.</p>
        <div class="fg"><label>Email</label><input type="email" id="fpem" placeholder="nome@email.com" required></div>
        <button class="btn btn-primary btn-block" type="submit" id="req-btn">Enviar código</button>
        <div style="text-align:center;margin-top:12px;font-size:13px"><a href="login.html">← Voltar</a></div>
      </form>

      <form class="card" id="reset-form" style="display:none">
        <h2 style="margin-bottom:16px">Nova palavra-passe</h2>
        <div class="fg"><label>Código enviado para <span id="reset-email"></span></label><input id="rpc" placeholder="000000" maxlength="6"></div>
        <div class="fg"><label>Nova palavra-passe</label><input type="password" id="rpp" placeholder="Mínimo 8 caracteres" minlength="8"></div>
        <button class="btn btn-primary btn-block" type="submit" id="reset-btn">Redefinir</button>
      </form>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
let _resetEmail = '';
initPage({ active: '', onReady: (user) => {
  if (user) { go('dashboard.html'); return; }

  document.getElementById('req-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('fpem').value.trim();
    if (!email) { toast('Introduza o seu email.', 'warn'); return; }
    const btn = document.getElementById('req-btn');
    setLoading(btn, true);
    try {
      await api.post('/auth/forgot-password', { email });
      toast('Se o email existir, receberá um código.', 'info');
      _resetEmail = email;
      document.getElementById('reset-email').textContent = email;
      document.getElementById('req-form').style.display = 'none';
      document.getElementById('reset-form').style.display = 'block';
    } catch (err) {
      toast(apiErrorMessage(err), 'err');
    } finally { setLoading(btn, false); }
  });

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const code = document.getElementById('rpc').value.trim();
    const newPassword = document.getElementById('rpp').value;
    if (code.length !== 6) { toast('Código deve ter 6 dígitos.', 'warn'); return; }
    if (newPassword.length < 8) { toast('Palavra-passe muito curta.', 'warn'); return; }
    const btn = document.getElementById('reset-btn');
    setLoading(btn, true);
    try {
      await api.post('/auth/reset-password', { email: _resetEmail, code, newPassword });
      toast('Palavra-passe redefinida! Faça login.');
      setTimeout(() => go('login.html'), 800);
    } catch (err) {
      setLoading(btn, false);
      toast(apiErrorMessage(err), 'err');
    }
  });
}});
</script>
</body></html>
