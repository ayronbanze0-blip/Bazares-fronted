<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Encomendas — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div class="sh-row">
      <div class="sh"><h2 id="ao-title">Encomendas</h2></div>
      <select id="ao-status" style="width:180px">
        <option value="">Todos os estados</option>
        <option value="PENDENTE">Pendente</option><option value="ACEITE">Aceite</option>
        <option value="EM_PREPARACAO">Em Preparação</option><option value="EM_ENTREGA">Em Entrega</option>
        <option value="ENTREGUE">Entregue</option><option value="CANCELADA">Cancelada</option>
      </select>
    </div>
    <div id="ao-list"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'admin-orders.html', requireAuth: true, roles: ['ADMIN'], onReady: () => {
  document.getElementById('ao-status').addEventListener('change', loadAdminOrders);
  loadAdminOrders();
}});

async function loadAdminOrders() {
  const list = document.getElementById('ao-list');
  const status = document.getElementById('ao-status').value;
  try {
    const res = await api.get('/admin/orders', { status: status || undefined, limit: 100 });
    const orders = res?.data?.orders || [];
    document.getElementById('ao-title').textContent = `Encomendas (${orders.length})`;
    list.innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>Ref</th><th>Produto</th><th>Comprador</th><th>Vendedor</th><th>Total</th><th>Taxa</th><th>Estado</th><th>Data</th></tr></thead><tbody>
      ${orders.map(o => `<tr>
        <td style="font-family:monospace;font-size:11px">${o.id.slice(0,8)}</td>
        <td>${esc(o.items?.[0]?.name||'')}</td>
        <td style="font-size:12px">${esc(o.buyer?.name||'')}</td>
        <td style="font-size:12px">${esc(o.seller?.name||'')}</td>
        <td style="font-weight:700">${fmtMT(o.total)}</td>
        <td style="color:var(--red)">${o.feeAmount>0?fmtMT(o.feeAmount):'—'}</td>
        <td>${stBadge(o.status)}</td>
        <td style="font-size:11px;color:var(--t4)">${fmtDate(o.createdAt)}</td>
      </tr>`).join('')}
    </tbody></table></div>`;
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;
  }
}
</script>
</body></html>
