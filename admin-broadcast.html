<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Avisos — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div class="sh"><h2>Enviar Aviso Geral</h2></div>
    <form class="card" id="bc-form" style="max-width:560px">
      <div class="fg"><label>Destinatários</label>
        <select id="bc-role">
          <option value="all">Todos</option><option value="SELLER">Vendedores</option>
          <option value="BUYER">Compradores</option><option value="REVENDEDOR">Revendedores</option>
        </select>
      </div>
      <div class="fg"><label>Tipo</label>
        <select id="bc-type"><option value="INFO">Informação</option><option value="WARNING">Aviso</option><option value="SUCCESS">Boas notícias</option></select>
      </div>
      <div class="fg"><label>Mensagem</label><textarea id="bc-msg" rows="5" placeholder="Escreva o aviso..." required></textarea></div>
      <button class="btn btn-primary" type="submit" id="bc-submit">Enviar</button>
    </form>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'admin-broadcast.html', requireAuth: true, roles: ['ADMIN'], onReady: () => {
  document.getElementById('bc-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const role = document.getElementById('bc-role').value;
    const type = document.getElementById('bc-type').value;
    const message = document.getElementById('bc-msg').value.trim();
    if (!message) { toast('Escreva a mensagem.', 'warn'); return; }
    const btn = document.getElementById('bc-submit');
    setLoading(btn, true);
    try {
      const res = await api.post('/admin/broadcast', { role, message, type });
      toast(`Aviso enviado a ${res?.data?.recipientCount ?? 0} utilizadores.`);
      document.getElementById('bc-msg').value = '';
    } catch (err) { toast(apiErrorMessage(err), 'err'); }
    finally { setLoading(btn, false); }
  });
}});
</script>
</body></html>
