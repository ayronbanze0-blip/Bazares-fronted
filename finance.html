<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Financeiro — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header><div class="overlay" id="overlay"></div><aside id="sidebar" class="closed"></aside>
<div id="main"><div id="view" class="pg-body"></div></div>
<div id="modal-root"></div><div id="toast-root"></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
initPage({ active:'finance.html', requireAuth:true, roles:['SELLER'], onReady: async()=>{
  const view=document.getElementById('view');
  view.innerHTML=`<div style="text-align:center;padding:60px"><span class="spinner spinner-dark"></span></div>`;
  let bazar=null, orders=[], payments=[];
  try{ bazar=(await api.get('/bazars/me'))?.data?.bazar; } catch{}
  try{ orders=(await api.get('/orders/received',{limit:200,status:'ENTREGUE'}))?.data?.orders||[]; } catch{}
  try{ payments=(await api.get('/finance/payments'))?.data?.payments||[]; } catch{}

  const FEE=150;
  const pf=bazar?.pendingFees||0;
  const totalRev=orders.reduce((s,o)=>s+o.total,0);
  const totalPaid=payments.filter(p=>p.status==='APROVADO').reduce((s,p)=>s+p.amount,0);
  const pct=Math.min(100,Math.round((pf/FEE)*100));

  view.innerHTML=`
    <div class="pg-hero">
      <div class="pg-hero-content">
        <div class="section-pill">💰 Financeiro</div>
        <h1>Painel Financeiro</h1>
        <p>Acompanhe as suas receitas e contribuições</p>
      </div>
    </div>
    ${pf>=FEE?`<div class="alert a-err" style="margin-bottom:18px"><span>⚠️</span><div>Contribuição de <strong>${fmtMT(pf)}</strong> atingida! <a href="wallet.html" style="font-weight:700;color:var(--red);text-decoration:underline">Pague agora na sua Wallet →</a></div></div>`:''}
    <div class="stats-row">
      <div class="stat acc"><div class="stat-accent-bar" style="background:var(--g-gold)"></div><div class="val">${fmtMT(totalRev)}</div><div class="lbl">Receita total</div></div>
      <div class="stat"><div class="stat-accent-bar" style="background:var(--g-green)"></div><div class="val">${orders.length}</div><div class="lbl">Encomendas entregues</div></div>
      <div class="stat"><div class="stat-accent-bar" style="background:var(--a-500)"></div><div class="val" style="color:var(--a-600)">${fmtMT(pf)}</div><div class="lbl">Contribuição acumulada</div></div>
      <div class="stat"><div class="stat-accent-bar" style="background:var(--b-500)"></div><div class="val">${fmtMT(totalPaid)}</div><div class="lbl">Total pago</div></div>
    </div>
    <div class="widget-grid" style="margin-bottom:24px">
      <div class="fin-progress-card">
        <div class="fin-progress-head">
          <h3 style="margin:0">Contribuição de plataforma</h3>
          <span style="font-weight:700;color:${pct>=100?'var(--red)':pct>=70?'var(--amb)':'var(--b-500)'}">${fmtMT(pf)} / ${fmtMT(FEE)}</span>
        </div>
        <div class="prog" style="height:12px;margin-bottom:8px">
          <div class="prog-fill ${pct>=100?'pf-red':pct>=70?'pf-gold':'pf-grn'}" style="width:${pct}%"></div>
        </div>
        <p style="font-size:12px;color:var(--t3)">A cada ${fmtMT(FEE)} de vendas efectuadas, é solicitado o pagamento de uma contribuição de plataforma.</p>
        ${pf>0?`<a href="wallet.html" class="btn btn-primary btn-sm btn-block" style="margin-top:12px">💼 Pagar contribuição na Wallet</a>`:''}
      </div>
      <div class="card">
        <h4 style="margin-bottom:16px">📊 Resumo mensal</h4>
        ${orders.length?`
          <div style="display:flex;flex-direction:column;gap:8px">
            ${Object.entries(orders.reduce((acc,o)=>{const m=new Date(o.createdAt).toLocaleDateString('pt-MZ',{month:'short',year:'numeric'});acc[m]=(acc[m]||0)+o.total;return acc;},{})).slice(-4).map(([m,v])=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surf3);border-radius:var(--r);border:1px solid var(--brd)">
                <span style="font-size:13px;font-weight:500">${m}</span>
                <span style="font-family:'Inter',sans-serif;font-weight:800;font-weight:700;color:var(--b-600)">${fmtMT(v)}</span>
              </div>`).join('')}
          </div>`:`<div class="empty" style="padding:20px"><div class="empty-ico">📊</div><p>Sem dados ainda</p></div>`}
      </div>
    </div>
    <div class="sh-row"><h2>Histórico de vendas</h2></div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Data</th><th>Produto(s)</th><th>Comprador</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>
          ${orders.length?orders.map(o=>`<tr>
            <td style="color:var(--t3)">${fmtDate(o.createdAt)}</td>
            <td>${esc(o.items?.[0]?.name||o.items?.[0]?.product?.name||'—')}</td>
            <td>${esc(o.buyer?.name||'—')}</td>
            <td style="font-family:'Inter',sans-serif;font-weight:800;font-weight:700;color:var(--b-600)">${fmtMT(o.total)}</td>
            <td>${stBadge(o.status)}</td>
          </tr>`).join(''):`<tr><td colspan="5" style="text-align:center;color:var(--t4);padding:32px">Sem vendas ainda</td></tr>`}
        </tbody>
      </table>
    </div>`;
}});
</script></body></html>
