<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mensagens — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.chat-root {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: calc(100vh - var(--tb-h, 60px));
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: var(--rl);
  overflow: hidden;
  box-shadow: var(--sh1);
}
.chat-sidebar {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--brd);
  background: var(--surf);
}
.chat-sidebar-hd {
  padding: 16px;
  border-bottom: 1px solid var(--brd);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surf);
  position: sticky;
  top: 0;
  z-index: 1;
}
.chat-sidebar-hd h3 { font-size: 16px; margin: 0; }
.chat-search {
  padding: 10px 12px;
  border-bottom: 1px solid var(--brd);
}
.chat-search input {
  width: 100%;
  background: var(--surf3);
  border-radius: var(--pill);
  font-size: 16px;
  padding: 8px 14px;
  border: 1px solid transparent;
  transition: border var(--ease);
}
.chat-search input:focus { border-color: var(--b-300); outline: none; }
.chat-list-inner { flex: 1; overflow-y: auto; }
.ci {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--brd);
  transition: background .15s;
  position: relative;
}
.ci:hover { background: var(--surf3); }
.ci.active { background: var(--b-50); }
.ci-avatar { position: relative; flex-shrink: 0; }
.ci-online {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #22c55e;
  border: 2px solid var(--surf);
}
.ci-body { flex: 1; min-width: 0; }
.ci-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.ci-name { font-weight: 700; font-size: 13.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
.ci-time { font-size: 10px; color: var(--t4); flex-shrink: 0; }
.ci-preview { font-size: 12px; color: var(--t3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-preview.unread { color: var(--text); font-weight: 600; }
.ci-badge {
  background: var(--g-green);
  color: #fff;
  border-radius: var(--pill);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  flex-shrink: 0;
  margin-left: 4px;
  min-width: 20px;
  text-align: center;
}
.chat-pane {
  display: flex;
  flex-direction: column;
  background: var(--surf3);
  position: relative;
}
.chat-hd {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  background: var(--surf);
  border-bottom: 1px solid var(--brd);
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  z-index: 1;
}
.chat-hd-info { flex: 1; }
.chat-hd-name { font-weight: 700; font-size: 15px; color: var(--text); }
.chat-hd-status { font-size: 11px; color: var(--t4); margin-top: 1px; }
.chat-hd-online { color: #22c55e; font-weight: 600; }
.chat-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 18px 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  background-image: radial-gradient(circle, var(--brd) 1px, transparent 1px);
  background-size: 24px 24px;
  background-color: var(--surf3);
}
.msg-date-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 12px 0 8px;
}
.msg-date-sep::before,
.msg-date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--brd2);
}
.msg-date-sep span {
  font-size: 10px;
  font-weight: 600;
  color: var(--t4);
  background: var(--surf3);
  padding: 2px 10px;
  border-radius: var(--pill);
  border: 1px solid var(--brd2);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 7px;
  animation: msgIn .18s ease;
}
.msg-row.me { flex-direction: row-reverse; }
.msg-row.them { flex-direction: row; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bubble {
  max-width: 68%;
  padding: 9px 13px 6px;
  border-radius: 18px;
  font-size: 13.5px;
  line-height: 1.55;
  position: relative;
  word-break: break-word;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.bubble.me {
  background: var(--g-green);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.bubble.them {
  background: var(--surf);
  color: var(--text);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--brd);
}
.bubble-meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  margin-top: 3px;
}
.bubble-time {
  font-size: 10px;
  opacity: .6;
}
.bubble.them .bubble-time { text-align: left; }
.bubble-tick { font-size: 11px; opacity: .7; }
.bubble-tick.read { opacity: 1; color: #60a5fa; }
.msg-av { width: 26px; height: 26px; flex-shrink: 0; margin-bottom: 2px; }
.msg-av .avatar { width: 26px !important; height: 26px !important; font-size: 10px !important; }
.msg-av-spacer { width: 26px; flex-shrink: 0; }
.msg-row.consec .msg-av { visibility: hidden; }
.msg-row.consec { margin-top: -1px; }
.typing-bubble {
  display: none;
  align-items: flex-end;
  gap: 7px;
  padding: 4px 0 6px;
}
.typing-bubble.show { display: flex; }
.typing-dots {
  background: var(--surf);
  border: 1px solid var(--brd);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 10px 16px;
  display: flex;
  gap: 4px;
  align-items: center;
}
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--t4);
  animation: typingBounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes typingBounce {
  0%,60%,100% { transform: translateY(0); }
  30%          { transform: translateY(-5px); }
}
.chat-inp-bar {
  padding: 10px 14px;
  background: var(--surf);
  border-top: 1px solid var(--brd);
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-inp-bar textarea {
  flex: 1;
  resize: none;
  border-radius: 22px;
  background: var(--surf3);
  border: 1px solid var(--brd);
  padding: 9px 16px;
  font-size: 13.5px;
  line-height: 1.5;
  max-height: 120px;
  overflow-y: auto;
  transition: border .2s;
  font-family: inherit;
}
.chat-inp-bar textarea:focus { outline: none; border-color: var(--b-400); }
.chat-inp-bar textarea::placeholder { color: var(--t4); }
.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--g-green);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform .15s, opacity .15s;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.send-btn:hover { transform: scale(1.08); }
.send-btn:active { transform: scale(.94); }
.send-btn svg { width: 18px; height: 18px; fill: #fff; }
.chat-empty-pane {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--t4);
}
.chat-empty-pane .ico { font-size: 52px; opacity: .5; }
.chat-empty-pane p { font-size: 14px; }
.chat-main-wrap { padding: 0 !important; margin-left: 0 !important; }
@media (max-width: 700px) {
  .chat-root { grid-template-columns: 1fr; height: calc(100vh - var(--tb-h, 60px)); }
  .chat-sidebar { display: none; }
  .chat-sidebar.mob-show { display: flex; position: absolute; inset: 0; z-index: 10; width: 100%; }
  .chat-pane { display: none; }
  .chat-pane.mob-show { display: flex; }
  .chat-mob-back { display: flex !important; }
}
.chat-mob-back { display: none; }
</style>
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main" class="chat-main-wrap">
  <div id="view"><div style="padding:40px;text-align:center;color:#94A3B8;font-size:13px">A carregar mensagens...</div></div>
</div>
<div id="modal-root"></div><div id="toast-root"></div>
<script>
function showJsError(label, detail) {
  var el = document.getElementById('view') || document.body;
  el.innerHTML = '<div style="padding:30px;font-family:monospace;font-size:12px;white-space:pre-wrap;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:16px">' +
    label + ':\n' + detail + '</div>';
}
window.addEventListener('error', function(ev) {
  showJsError('ERRO JS', (ev.message || 'erro desconhecido') + '\n\nFicheiro: ' + (ev.filename || '-') + '\nLinha: ' + (ev.lineno || '-') + ':' + (ev.colno || '-'));
});
window.addEventListener('unhandledrejection', function(ev) {
  var r = ev.reason;
  var msg = (r && (r.stack || r.message)) ? (r.message || '') + '\n' + (r.stack || '') : String(r);
  showJsError('PROMISE REJEITADA', msg);
});
</script>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
<script>
'use strict';
let _chats = [], _activeChatId = null, _meId = null, _pollTimer = null, _socket = null;
let _searchQ = '';
let _socketLoading = false;

function loadSocketIoScript() {
  if (window.io || _socketLoading) return;
  _socketLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdn.socket.io/4.7.5/socket.io.min.js';
  s.async = true;
  s.onload = () => { try { initSocket(); } catch {} };
  s.onerror = () => {};
  document.head.appendChild(s);
}

initPage({ active: 'chat.html', requireAuth: true, onReady: async (user) => {
  _meId = user.id;

  document.getElementById('view').innerHTML = `
    <div class="chat-root" id="chat-root">
      <div class="chat-sidebar" id="chat-sidebar">
        <div class="chat-sidebar-hd">
          <h3>💬 Conversas</h3>
          <span id="chat-unread-total" style="font-size:12px;color:var(--t4)"></span>
        </div>
        <div class="chat-search">
          <input id="chat-search-inp" placeholder="🔍  Pesquisar conversas..." oninput="filterChats(this.value)">
        </div>
        <div class="chat-list-inner" id="chat-list"></div>
      </div>
      <div class="chat-pane" id="chat-pane">
        <div class="chat-empty-pane">
          <div class="ico">💬</div>
          <p>Seleccione uma conversa para começar</p>
        </div>
      </div>
    </div>`;

  await loadChats();
  loadSocketIoScript();

  // On mobile: sidebar starts hidden (CSS), must add mob-show to make it visible
  if (window.innerWidth <= 700) {
    document.getElementById('chat-sidebar')?.classList.add('mob-show');
  }

  // Keep sidebar/pane visible on resize
  window.addEventListener('resize', () => {
    const sidebar = document.getElementById('chat-sidebar');
    const pane = document.getElementById('chat-pane');
    if (!sidebar || !pane) return;
    if (window.innerWidth > 700) {
      sidebar.classList.remove('mob-show');
      pane.classList.remove('mob-show');
    } else if (!_activeChatId) {
      sidebar.classList.add('mob-show');
      pane.classList.remove('mob-show');
    }
  });

  const initId = getParam('chatId');
  if (initId) openChat(initId);
}});

async function loadChats() {
  const list = document.getElementById('chat-list');
  list.innerHTML = `<div style="text-align:center;padding:30px"><span class="spinner spinner-dark"></span></div>`;
  try {
    const res = await api.get('/chat');
    _chats = res?.data?.chats || [];
    renderChatList(_chats);
    const total = _chats.reduce((s, c) => s + (c.unreadCount || 0), 0);
    const badge = document.getElementById('chat-unread-total');
    if (badge) badge.textContent = total > 0 ? `${total} não lida${total > 1 ? 's' : ''}` : '';
  } catch (e) {
    list.innerHTML = `<div class="empty" style="padding:24px"><p>${esc(apiErrorMessage(e))}</p></div>`;
  }
}

function renderChatList(chats) {
  const list = document.getElementById('chat-list');
  const q = _searchQ.toLowerCase();
  const filtered = q ? chats.filter(c => {
    const other = c.other || (c.userAId === _meId ? c.userB : c.userA);
    return other?.name?.toLowerCase().includes(q);
  }) : chats;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty" style="padding:40px"><div class="empty-ico">💬</div><h3>${q ? 'Sem resultados' : 'Sem conversas'}</h3></div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const other = c.other || (c.userAId === _meId ? c.userB : c.userA);
    const last = c.lastMessage;
    const isUnread = (c.unreadCount || 0) > 0;
    const timeStr = last?.createdAt ? fmtChatTime(last.createdAt) : '';
    const preview = last?.text
      ? (last.senderId === _meId ? `Você: ${last.text}` : last.text)
      : 'Sem mensagens';
    return `<div class="ci${_activeChatId === c.id ? ' active' : ''}" id="ci-${c.id}" onclick="openChat('${c.id}')">
      <div class="ci-avatar">
        ${other?.avatarUrl
          ? `<img src="${esc(other.avatarUrl)}" style="width:42px;height:42px;border-radius:50%;object-fit:cover">`
          : avatar(other?.name || '?', 42)}
      </div>
      <div class="ci-body">
        <div class="ci-top">
          <div class="ci-name">${esc(other?.name || 'Utilizador')}</div>
          <div class="ci-time">${esc(timeStr)}</div>
        </div>
        <div class="ci-preview${isUnread ? ' unread' : ''}">${esc(preview)}</div>
      </div>
      ${isUnread ? `<div class="ci-badge">${c.unreadCount}</div>` : ''}
    </div>`;
  }).join('');
}

function filterChats(q) {
  _searchQ = q;
  renderChatList(_chats);
}

function fmtChatTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  const now = new Date();
  const diff = now - dt;
  if (diff < 60000) return 'agora';
  if (diff < 3600000) return Math.floor(diff / 60000) + ' min';
  if (dt.toDateString() === now.toDateString()) return fmtTime(d);
  if (diff < 86400000 * 7) {
    return dt.toLocaleDateString('pt-MZ', { weekday: 'short' });
  }
  return dt.toLocaleDateString('pt-MZ', { day: '2-digit', month: '2-digit' });
}

function fmtMsgDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  const now = new Date();
  if (dt.toDateString() === now.toDateString()) return 'Hoje';
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (dt.toDateString() === yesterday.toDateString()) return 'Ontem';
  return dt.toLocaleDateString('pt-MZ', { day: '2-digit', month: 'long', year: 'numeric' });
}

async function openChat(chatId) {
  if (_pollTimer) clearInterval(_pollTimer);
  if (_socket?.connected && _activeChatId) _socket.emit('chat:leave', { chatId: _activeChatId });
  _activeChatId = chatId;

  document.querySelectorAll('.ci').forEach(el => {
    el.classList.toggle('active', el.id === `ci-${chatId}`);
  });
  const ci = document.getElementById(`ci-${chatId}`);
  if (ci) {
    const badge = ci.querySelector('.ci-badge');
    if (badge) badge.remove();
    ci.querySelector('.ci-preview')?.classList.remove('unread');
    const ch = _chats.find(c => c.id === chatId);
    if (ch) ch.unreadCount = 0;
  }

  const chat = _chats.find(c => c.id === chatId);
  const other = chat ? (chat.other || (chat.userAId === _meId ? chat.userB : chat.userA)) : null;
  const pane = document.getElementById('chat-pane');

  pane.innerHTML = `
    <div class="chat-hd">
      <button class="btn-icon chat-mob-back" onclick="mobileBack()" aria-label="Voltar">←</button>
      <div style="position:relative">
        ${other?.avatarUrl
          ? `<img src="${esc(other.avatarUrl)}" style="width:40px;height:40px;border-radius:50%;object-fit:cover">`
          : avatar(other?.name || '?', 40)}
        <div class="ci-online" id="online-dot" style="display:none"></div>
      </div>
      <div class="chat-hd-info">
        <div class="chat-hd-name">${esc(other?.name || 'Utilizador')}</div>
        <div class="chat-hd-status" id="hd-status">${esc(ROLE_LABEL[other?.role] || '')}</div>
      </div>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="typing-bubble" id="typing-bubble">
      <div class="msg-av">${avatar(other?.name||'?',26,other?.avatarUrl||other?.photoUrl||null)}</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="chat-inp-bar">
      <textarea id="msg-inp" rows="1" placeholder="Escreva uma mensagem..."
        oninput="autoResize(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="send-btn" onclick="sendMsg()" aria-label="Enviar">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>`;

  await loadMessages(chatId);
  document.getElementById('msg-inp')?.focus();
  _pollTimer = setInterval(() => loadMessages(chatId, true), 4000);

  if (_socket?.connected) {
    _socket.emit('chat:join', { chatId });
  } else if (_socket) {
    _socket.once('connect', () => _socket.emit('chat:join', { chatId }));
  }

  if (window.innerWidth <= 700) {
    document.getElementById('chat-sidebar')?.classList.remove('mob-show');
    pane.classList.add('mob-show');
  }
}

async function loadMessages(chatId, silent = false) {
  if (_activeChatId !== chatId) return;
  const container = document.getElementById('chat-msgs');
  if (!container) return;
  if (!silent) container.innerHTML = `<div style="text-align:center;padding:24px"><span class="spinner spinner-dark"></span></div>`;

  try {
    const res = await api.get(`/chat/${chatId}/messages`, { limit: 60 });
    const msgs = res?.data?.messages || [];
    // Garantir ordem cronológica: mais antigas em cima, mais recentes em baixo
    msgs.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    if (!msgs.length) {
      container.innerHTML = `<div class="chat-empty-pane" style="height:100%"><div class="ico" style="font-size:36px">👋</div><p>Comece a conversa!</p></div>`;
      return;
    }

    const atBottom = !silent || (container.scrollHeight - container.scrollTop - container.clientHeight < 100);

    let html = '';
    let lastDate = '';
    let lastSender = '';

    msgs.forEach((m, i) => {
      const isMe = m.senderId === _meId;
      const side = isMe ? 'me' : 'them';
      const msgDate = fmtMsgDate(m.createdAt);
      const consec = lastSender === m.senderId && msgDate === lastDate;
      lastSender = m.senderId;

      if (msgDate !== lastDate) {
        lastDate = msgDate;
        html += `<div class="msg-date-sep"><span>${esc(msgDate)}</span></div>`;
      }

      const avHtml = !isMe
        ? `<div class="msg-av">${consec ? '' : (m.sender?.avatarUrl || m.sender?.photoUrl || m.sender?.photo_url
            ? `<img src="${esc(m.sender.avatarUrl||m.sender.photoUrl||m.sender.photo_url)}" style="width:26px;height:26px;border-radius:50%;object-fit:cover">`
            : avatar(m.sender?.name || '?', 26))}</div>`
        : `<div class="msg-av-spacer"></div>`;

      const tick = isMe ? `<span class="bubble-tick${m.read ? ' read' : ''}">✓✓</span>` : '';

      html += `
        <div class="msg-row ${side}${consec ? ' consec' : ''}">
          ${!isMe ? avHtml : ''}
          <div class="bubble ${side}">
            ${esc(m.text || m.content || '')}
            <div class="bubble-meta">
              <span class="bubble-time">${fmtTime(m.createdAt)}</span>
              ${tick}
            </div>
          </div>
          ${isMe ? avHtml : ''}
        </div>`;
    });

    container.innerHTML = html;
    if (atBottom) container.scrollTop = container.scrollHeight;

  } catch {}
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const text = inp?.value?.trim();
  if (!text || !_activeChatId) return;
  inp.value = '';
  inp.style.height = 'auto';

  const container = document.getElementById('chat-msgs');
  if (container) {
    const tmp = document.createElement('div');
    tmp.className = 'msg-row me';
    tmp.style.opacity = '.65';
    tmp.innerHTML = `
      <div class="msg-av-spacer"></div>
      <div class="bubble me">
        ${esc(text)}
        <div class="bubble-meta">
          <span class="bubble-time">${fmtTime(new Date())}</span>
          <span class="bubble-tick">✓</span>
        </div>
      </div>`;
    container.appendChild(tmp);
    container.scrollTop = container.scrollHeight;
  }

  try {
    if (_socket?.connected) {
      _socket.emit('message:send', { chatId: _activeChatId, text });
    } else {
      await api.post(`/chat/${_activeChatId}/messages`, { text });
    }
    await loadMessages(_activeChatId, true);

    const ch = _chats.find(c => c.id === _activeChatId);
    if (ch) {
      ch.lastMessage = { text, senderId: _meId, createdAt: new Date().toISOString() };
      renderChatList(_chats);
      document.getElementById(`ci-${_activeChatId}`)?.classList.add('active');
    }
  } catch (e) { toast(apiErrorMessage(e), 'err'); }
}

function initSocket() {
  if (_socket || typeof io === 'undefined') return;
  const token = getAccessToken();
  if (!token) return;

  try {
    _socket = io(SOCKET_BASE, { auth: { token }, transports: ['websocket', 'polling'] });
  } catch { _socket = null; return; }

  _socket.on('connect', () => {
    if (_activeChatId) _socket.emit('chat:join', { chatId: _activeChatId });
  });

  _socket.on('message:new', (msg) => {
    if (msg.chatId === _activeChatId) {
      loadMessages(_activeChatId, true);
    } else {
      const ch = _chats.find(c => c.id === msg.chatId);
      if (ch) {
        ch.lastMessage = msg;
        ch.unreadCount = (ch.unreadCount || 0) + 1;
        renderChatList(_chats);
        document.getElementById(`ci-${_activeChatId}`)?.classList.add('active');
      }
    }
  });

  _socket.on('typing:start', ({ chatId, userId }) => {
    if (chatId === _activeChatId && userId !== _meId) {
      const tb = document.getElementById('typing-bubble');
      if (tb) {
        tb.classList.add('show');
        clearTimeout(tb._t);
        tb._t = setTimeout(() => tb.classList.remove('show'), 2500);
      }
    }
  });

  _socket.on('typing:stop', ({ chatId, userId }) => {
    if (chatId === _activeChatId && userId !== _meId) {
      const tb = document.getElementById('typing-bubble');
      if (tb) tb.classList.remove('show');
    }
  });

  _socket.on('connect_error', () => {});
}

// Stop polling when user navigates away or logs out
window.addEventListener('beforeunload', () => { if (_pollTimer) clearInterval(_pollTimer); });
document.addEventListener('bazares:unauthorized', () => {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = null;
  _activeChatId = null;
});

let _typingTimer;
document.addEventListener('input', e => {
  if (e.target.id !== 'msg-inp' || !_socket?.connected || !_activeChatId) return;
  _socket.emit('typing:start', { chatId: _activeChatId });
  clearTimeout(_typingTimer);
  _typingTimer = setTimeout(() => {
    _socket.emit('typing:stop', { chatId: _activeChatId });
  }, 2000);
});

function mobileBack() {
  document.getElementById('chat-pane')?.classList.remove('mob-show');
  document.getElementById('chat-sidebar')?.classList.add('mob-show');
  if (_pollTimer) clearInterval(_pollTimer);
  if (_socket?.connected && _activeChatId) _socket.emit('chat:leave', { chatId: _activeChatId });
  _activeChatId = null;
}
</script>
