<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Auditoria — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div class="sh"><h2 id="al-title">Auditoria</h2></div>
    <div id="al-list"><div style="text-align:center;padding:40px"><span class="spinner spinner-dark"></span></div></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'admin-logs.html', requireAuth: true, roles: ['ADMIN'], onReady: async () => {
  const list = document.getElementById('al-list');
  try {
    const res = await api.get('/admin/audit-logs', { limit: 100 });
    const logs = res?.data?.logs || [];
    document.getElementById('al-title').textContent = `Auditoria (${logs.length} eventos)`;
    list.innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>Data</th><th>Acção</th><th>Entidade</th><th>IP</th></tr></thead><tbody>
      ${logs.length ? logs.map(l => `<tr>
        <td style="font-size:11px;color:var(--t4);white-space:nowrap">${fmtDate(l.createdAt)} ${fmtTime(l.createdAt)}</td>
        <td><span class="badge b-gray">${esc(l.action)}</span></td>
        <td style="font-size:13px">${esc(l.entity||'—')} ${l.entityId ? '#'+l.entityId.slice(0,8) : ''}</td>
        <td style="font-size:12px;color:var(--t3)">${esc(l.ipAddress||'—')}</td>
      </tr>`).join('') : `<tr><td colspan="4" style="text-align:center;color:var(--t4);padding:20px">Sem registos</td></tr>`}
    </tbody></table></div>`;
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-ico">⚠</div><h3>${esc(apiErrorMessage(e))}</h3></div>`;
  }
}});
</script>
</body></html>
