<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Definições — Bazares</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,500&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar"></header>
<div class="overlay" id="overlay"></div>
<aside id="sidebar" class="closed"></aside>
<div id="main">
  <div class="pg-body">
    <div style="max-width:480px">
      <div class="sh"><h2>Definições</h2></div>
      <div class="card" style="margin-bottom:14px">
        <h4 style="margin-bottom:14px">Aparência</h4>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:11px;background:var(--surf2);border-radius:var(--r)">
          <div><div style="font-weight:600;font-size:13px">Modo escuro</div><div style="font-size:11px;color:var(--t4)">Altera o tema da interface</div></div>
          <button class="btn btn-ghost btn-sm" onclick="toggleDark()">Alternar</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <h4 style="margin-bottom:14px">Segurança</h4>
        <div style="display:flex;flex-direction:column;gap:7px">
          <button class="btn btn-ghost btn-sm btn-block" onclick="go('forgot-password.html')">🔑 Alterar palavra-passe via email</button>
          <button class="btn btn-ghost btn-sm btn-block" onclick="doLogout()">🚪 Encerrar esta sessão</button>
          <button class="btn btn-ghost btn-sm btn-block" onclick="doLogoutAll()">🚪 Encerrar todas as sessões (todos os dispositivos)</button>
        </div>
      </div>
      <div class="card" style="border-color:var(--red)">
        <h4 style="color:var(--red);margin-bottom:8px">Eliminar conta</h4>
        <p style="font-size:13px;margin-bottom:12px">Esta acção é permanente. Todos os seus dados — produtos, pedidos, mensagens e avaliações — serão eliminados e não poderão ser recuperados.</p>
        <button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--red)" onclick="confirmDeleteAccount()">Eliminar a minha conta</button>
      </div>
    </div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
initPage({ active: 'settings.html', requireAuth: true });

async function doLogoutAll() {
  if (!confirm('Isto termina a sessão em todos os dispositivos, incluindo este. Continuar?')) return;
  try {
    await api.post('/auth/logout-all');
    setAccessToken(null);
    Session._user = null;
    toast('Todas as sessões foram terminadas.', 'info');
    setTimeout(() => go('login.html'), 800);
  } catch (e) { toast(apiErrorMessage(e), 'err'); }
}

function confirmDeleteAccount() {
  openModal(`
    <div class="modal-hd"><h3 style="color:var(--red)">Eliminar conta</h3><button class="modal-x" onclick="closeModal()">✕</button></div>
    <p style="margin-bottom:10px"><strong>Tens a certeza do que vais fazer?</strong></p>
    <p style="font-size:13px;color:var(--t3);margin-bottom:20px">Esta acção é irreversível. A tua conta, produtos, pedidos, mensagens e avaliações serão eliminados para sempre. Se mudares de ideias, terás de criar uma conta nova do zero.</p>
    <div style="display:flex;gap:9px">
      <button class="btn btn-danger" style="flex:1" id="del-acc-btn" onclick="doDeleteAccount()">Sim, eliminar tudo</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Voltar</button>
    </div>`);
}

async function doDeleteAccount() {
  const btn = document.getElementById('del-acc-btn');
  setLoading(btn, true);
  try {
    await api.delete('/users/me');
    setAccessToken(null);
    Session._user = null;
    closeModal();
    toast('Conta eliminada. Até breve! 👋', 'info');
    setTimeout(() => go('index.html'), 900);
  } catch (e) {
    setLoading(btn, false);
    toast(apiErrorMessage(e), 'err');
  }
}
</script>
</body></html>
